<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CEC Pricing Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--blue:#1a73e8;--blue2:#4285f4;--red:#e91e63;--lost:#ef476f;--orange:#ff7043;--yellow:#fbbc04;--green:#0f9d58;--ink:#202124;--muted:#5f6368;--line:#dadce0;--soft:#f8fafd;--card:#fff}
    *{box-sizing:border-box} html,body{width:100%;min-height:100%;overflow-x:hidden} body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--soft);color:var(--ink)}
    [hidden]{display:none!important} input,select,textarea,button{font-family:inherit} input,select,textarea{outline:none}
    .field{width:100%;border:1px solid #dfe3ea;background:#fff;border-radius:14px;padding:12px 14px;font-size:14px;transition:.15s;color:#202124}.field:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(26,115,232,.12)}
    .label{display:block;font-size:12px;font-weight:800;color:#5f6368;margin-bottom:8px}.card{background:var(--card);border:1px solid #e4e8ef;border-radius:24px;box-shadow:0 1px 2px rgba(60,64,67,.08),0 8px 24px rgba(60,64,67,.04)}
    .btn{border-radius:14px;padding:11px 16px;font-weight:800;font-size:14px;transition:.15s;border:1px solid transparent;display:inline-flex;align-items:center;gap:9px;justify-content:center}.btn:active{transform:scale(.98)}.btn-primary{background:var(--blue);color:white;box-shadow:0 8px 18px rgba(26,115,232,.22)}.btn-light{background:#fff;color:#3c4043;border-color:#dadce0}.btn-green{background:var(--green);color:white;box-shadow:0 8px 18px rgba(15,157,88,.18)}
    .pill{display:inline-flex;align-items:center;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:900}.table-wrap{max-width:100%;overflow-x:auto;overflow-y:hidden;border-radius:0 0 24px 24px}.mini-input{width:66px;border:1px solid #e5e8ec;background:#fff;border-radius:10px;padding:8px;text-align:right;font-size:13px}.mini-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,115,232,.10)}
    .hamb{width:52px;height:52px;border-radius:16px;border:1px solid #e3e7ee;background:#fff;display:grid;place-items:center;color:#253858;box-shadow:0 1px 2px rgba(60,64,67,.10)}
    .topbar{height:82px;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-bottom:1px solid #e7ebf2;position:sticky;top:0;z-index:30}.menu-pop{position:absolute;top:76px;left:16px;width:260px;background:#fff;border:1px solid #e5e9f0;border-radius:18px;box-shadow:0 18px 45px rgba(60,64,67,.18);padding:16px;z-index:50}.menu-item{width:100%;display:flex;align-items:center;gap:12px;text-align:left;padding:13px 14px;border-radius:14px;font-size:14px;font-weight:800;color:#3c4043}.menu-item.active{background:#e8f0fe;color:#1967d2}.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#4c8bf5,#1967d2);color:#fff;display:grid;place-items:center;font-weight:900}
    .status-qualified{background:#e8f0fe;color:#1967d2}.status-validated{background:#fff4ce;color:#b06000}.status-won{background:#e6f4ea;color:#188038}.status-lost,.status-lost-to-competition{background:#fde7ee;color:#c2185b}.status-noticed{background:#fff0e8;color:#e64a19}.status-draft{background:#f1f3f4;color:#5f6368}
    .dot{width:14px;height:14px;border-radius:999px;display:inline-block}.dot-won{background:var(--green)}.dot-lost{background:var(--lost)}.dot-noticed{background:var(--orange)}.dot-validated{background:var(--yellow)}
    .switch{width:52px;height:30px;border-radius:999px;background:#d9dee6;padding:4px;display:inline-flex;align-items:center;cursor:pointer}.switch span{width:22px;height:22px;border-radius:50%;background:#5f6368;transition:.15s}.switch.on{background:#d2e3fc}.switch.on span{transform:translateX(22px);background:#1967d2}
    .metric-icon{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;position:relative;cursor:help}.metric-icon[data-tip]:hover:after{content:attr(data-tip);position:absolute;left:0;bottom:58px;width:280px;background:#202124;color:#fff;border-radius:12px;padding:10px 12px;font-size:12px;line-height:1.35;font-weight:700;box-shadow:0 12px 28px rgba(32,33,36,.25);z-index:120}.metric-icon[data-tip]:hover:before{content:'';position:absolute;left:18px;bottom:50px;border:8px solid transparent;border-top-color:#202124;z-index:121}.soft-blue{background:#e8f0fe;color:#1967d2}.soft-green{background:#e6f4ea;color:#188038}.soft-purple{background:#f3e8ff;color:#7e22ce}.soft-orange{background:#fff0e8;color:#e64a19}.help-wrap{position:relative}.help-pop{display:none;position:absolute;right:0;top:48px;width:min(440px,calc(100vw - 32px));background:#fff;border:1px solid #e4e8ef;border-radius:18px;box-shadow:0 20px 55px rgba(60,64,67,.20);padding:18px;z-index:80}.help-wrap:hover .help-pop,.help-wrap.open .help-pop{display:block}.formula{background:#f8fafd;border:1px solid #edf0f4;border-radius:12px;padding:10px 12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:#3c4043}
  </style>
</head>
<body><div id="app"></div>
<script>
const API='/api';
let state={user:null,tab:'dashboard',menu:false,opps:[],tarifas:[],editing:null,calc:null,form:emptyForm()};
function emptyForm(){return{codigo:'SOC-YBAGC2E',nombre:'Nueva oportunidad',cliente:'Corbeta',unidad:'CU1',cierre:'2027Q1',estado:'',aprobado:'NO',es_inversion:false,gp_pct:28,contingencia_pct:0,poliza_pct:1,otros_costos_labor:'0',otros_costos_software:'0',recursos:[{actividad:'Discovery',perfil:'Consultor',banda:'3',meses:Array(24).fill(0)}]}}
const money=n=>'$ '+Number(n||0).toLocaleString('en-US',{maximumFractionDigits:0});
const num=v=>{let x=String(v??'0').replace(/[^0-9.-]/g,'');return Number(x||0)};
const payloadForm=()=>({...state.form,otros_costos_labor:num(state.form.otros_costos_labor),otros_costos_software:num(state.form.otros_costos_software)});
const slug=s=>String(s||'').toLowerCase().replaceAll(' - ','-').replaceAll(' ','-');
const statusPill=s=>`<span class="pill status-${slug(s)}">${s||'-'}</span>`;
async function api(url,opt={}){let r=await fetch(API+url,{headers:{'Content-Type':'application/json'},...opt}); if(!r.ok) throw new Error(await r.text()); return r.json()}
function after(){setTimeout(()=>{if(window.lucide)lucide.createIcons()},0)}
function set(part){Object.assign(state,part); render()} function toggleMenu(){state.menu=!state.menu;render()}
async function login(e){e.preventDefault();let fd=new FormData(e.target);try{let d=await api('/auth/login',{method:'POST',body:JSON.stringify({username:fd.get('u'),password:fd.get('p')})});state.user=d.usuario;await load()}catch(err){document.getElementById('loginMsg').textContent='Usuario o contraseña inválidos. Prueba oscar / demo123.'}}
async function load(){state.tarifas=await api('/tarifas');state.tarifas=state.tarifas.filter(t=>Number(t.banda)>=3&&Number(t.banda)<=10);state.opps=await api('/oportunidades');render()}
function update(path,val){let p=path.split('.'),o=state.form;while(p.length>1)o=o[p.shift()];o[p[0]]=val;render()} function addResource(){state.form.recursos.push({actividad:'',perfil:'Consultor',banda:'3',meses:Array(24).fill(0)});render()} function delResource(i){state.form.recursos.splice(i,1);render()}
async function calc(){state.calc=await api('/calcular',{method:'POST',body:JSON.stringify(payloadForm())});render()}
async function save(){let method=state.editing?'PUT':'POST',url=state.editing?'/oportunidades/'+state.editing:'/oportunidades';let d=await api(url,{method,body:JSON.stringify(payloadForm())});state.calc=d;state.editing=null;await load();state.tab='dashboard';render();alert('Oportunidad guardada')}
async function edit(id){let d=await api('/oportunidades/'+id);state.editing=id;state.form={codigo:d.codigo,nombre:d.nombre,cliente:d.cliente,unidad:d.unidad||'CU1',cierre:d.cierre,estado:d.estado,aprobado:d.aprobado,es_inversion:!!d.es_inversion,gp_pct:d.gp_pct,contingencia_pct:d.contingencia_pct,poliza_pct:d.poliza_pct,otros_costos_labor:d.otros_costos_labor,otros_costos_software:d.otros_costos_software,recursos:d.recursos.map(r=>({actividad:r.actividad,perfil:r.perfil,banda:String(r.banda),meses:r.meses}))};state.calc={precio:d.precio,costo_total_equipo:d.costo_total_equipo,horas_totales:d.horas_totales,revenue_mes:d.revenue_mes,pti_pct:d.pti_pct};state.tab='calc';state.menu=false;render()}
function newCalc(){state.form=emptyForm();state.editing=null;state.calc=null;set({tab:'calc',menu:false})}
function go(tab){state.tab=tab;state.menu=false;render()}
function loginView(){return `<main class="min-h-screen grid place-items-center px-6 bg-[#f8fafd]"><form onsubmit="login(event)" class="w-full max-w-[420px] card p-8"><div class="flex items-center gap-2 mb-8"><span class="text-3xl font-black tracking-tight">CEC</span><span class="w-2.5 h-2.5 bg-[#4285F4] rounded-full mt-4"></span></div><h1 class="text-2xl font-extrabold mb-2">Calculadora CEC</h1><p class="text-sm text-[#5f6368] mb-7">Ingresa para gestionar oportunidades y precio orientativo.</p><label class="label">Usuario</label><input name="u" value="oscar" class="field mb-4"><label class="label">Contraseña</label><input name="p" value="demo123" type="password" class="field mb-5"><p id="loginMsg" class="text-sm text-[#EA4335] mb-3 min-h-5"></p><button class="btn btn-primary w-full">Entrar</button></form></main>`}
function shell(){return `<div class="min-h-screen"><header class="topbar"><div class="h-full flex items-center justify-between px-4 md:px-8"><div class="flex items-center gap-5 min-w-0"><button onclick="toggleMenu()" class="hamb" title="Menú"><i data-lucide="menu"></i></button><div class="min-w-0"><h1 class="text-2xl md:text-3xl font-black tracking-tight truncate">${state.tab==='dashboard'?'Oportunidades':'Consult CEC - Precio orientativo'}</h1><p class="hidden md:block text-[#5f6368] mt-1">${state.tab==='dashboard'?'Gestiona el portafolio de oportunidades CEC.':'Costo = FTE mensual × 160 horas × tarifa banda. Precio = costo × (contingencia + póliza) / factor GP.'}</p></div></div><div class="flex items-center gap-4"><div class="help-wrap hidden sm:block" onclick="this.classList.toggle('open')"><button class="grid place-items-center w-10 h-10 rounded-full text-[#5f6368] hover:bg-[#f1f3f4]" title="Ver formulas"><i data-lucide="circle-help"></i></button><div class="help-pop"><h3 class="font-black text-lg mb-2">Formulas usadas</h3><p class="text-sm text-[#5f6368] mb-3">Estas formulas se aplican con los datos capturados en la calculadora.</p><div class="space-y-2"><div class="formula">Horas por mes = FTE del mes x 160</div><div class="formula">Costo equipo = Sumatoria(Horas por mes x Tarifa de banda)</div><div class="formula">Revenue base = Costo equipo / (1 - % GP)</div><div class="formula">Precio aprox. = Revenue base + Otros costos + Contingencia + Poliza</div><div class="formula">PTI % = (Precio aprox. - Costo equipo) / Precio aprox.</div><div class="formula">Switch Es inversion = clasifica la oportunidad como inversion, no agrega un valor manual.</div></div></div></div><div class="avatar">${(state.user.nombre||'O').charAt(0)}</div><div class="hidden sm:block"><div class="font-extrabold">${state.user.nombre}</div><div class="text-sm text-[#5f6368]">${state.user.rol}</div></div></div></div>${state.menu?menu():''}</header><main class="p-5 md:p-8 lg:p-10 max-w-[1500px] mx-auto">${state.tab==='dashboard'?dashboard():calculator()}</main></div>`}
function menu(){return `<div class="menu-pop"><button onclick="go('dashboard')" class="menu-item ${state.tab==='dashboard'?'active':''}"><i data-lucide="home" class="w-5 h-5"></i> Oportunidades</button><button onclick="newCalc()" class="menu-item ${state.tab==='calc'?'active':''}"><i data-lucide="calculator" class="w-5 h-5"></i> Calculadora</button><div class="border-t border-[#edf0f4] my-4"></div><div class="flex items-center gap-3 px-3 py-2"><div class="avatar !w-10 !h-10">${(state.user.nombre||'O').charAt(0)}</div><div><div class="font-extrabold">${state.user.nombre}</div><div class="text-sm text-[#5f6368]">${state.user.rol}</div></div></div><button onclick="state.user=null;state.menu=false;render()" class="menu-item mt-2"><i data-lucide="log-out" class="w-5 h-5"></i> Cerrar sesión</button></div>`}
function dashboard(){return `<div class="flex flex-wrap gap-4 justify-between items-start mb-6"><div><div class="pill status-qualified mb-3">Pricing workspace</div><h2 class="text-3xl font-black tracking-tight">Aquí están todas las oportunidades</h2><p class="text-[#5f6368] mt-2">Consulta, edita y crea oportunidades CEC.</p></div><button onclick="newCalc()" class="btn btn-primary"><i data-lucide="plus"></i>Nueva oportunidad</button></div><section class="card overflow-hidden"><div class="grid grid-cols-[1.1fr_1.6fr_1fr_.7fr_1.1fr_1fr] gap-4 px-6 py-4 bg-[#f8fafd] text-xs font-black uppercase text-[#5f6368]"><div>Código</div><div>Nombre oportunidad</div><div>Cliente</div><div>CU</div><div>Estado</div><div class="text-right">Precio</div></div>${state.opps.map(o=>`<div class="grid grid-cols-[1.1fr_1.6fr_1fr_.7fr_1.1fr_1fr] gap-4 px-6 py-4 border-t border-[#edf0f4] items-center text-sm"><div class="font-extrabold">${o.codigo}</div><div>${o.nombre}</div><div class="text-[#5f6368]">${o.cliente||'-'}</div><div>${o.unidad||'-'}</div><div>${statusPill(o.estado)}</div><div class="text-right"><div class="font-black text-[#188038]">${money(o.precio)}</div><button onclick="edit(${o.id})" class="text-[#1967d2] font-extrabold mt-1">Editar</button></div></div>`).join('')||'<div class="p-8 text-[#5f6368]">No hay oportunidades guardadas.</div>'}</section>`}
function calculator(){let f=state.form,months=Array.from({length:24},(_,i)=>i+1),bands=[3,4,5,6,7,8,9,10],statuses=['','Qualified','Validated','Won','Lost - Lost to Competition','Noticed','Draft'];return `<div class="flex flex-wrap gap-4 justify-end items-center mb-5"><button onclick="calc()" class="btn btn-primary"><i data-lucide="calculator"></i>Calcular</button><button onclick="save()" class="btn btn-green"><i data-lucide="save"></i>Guardar</button></div><section class="card p-6 mb-6"><div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-5"><div><label class="label">Código Oportunidad</label><input class="field" value="${f.codigo}" onchange="update('codigo',this.value)" placeholder="SOC-XXXXXX"></div><div><label class="label">Nombre Oportunidad</label><input class="field" value="${f.nombre}" onchange="update('nombre',this.value)" placeholder="Nombre de la oportunidad"></div><div><label class="label">Nombre del cliente</label><input class="field" value="${f.cliente}" onchange="update('cliente',this.value)" placeholder="Cliente"></div><div><label class="label">Cierre de la oportunidad</label><input class="field" value="${f.cierre}" onchange="update('cierre',this.value)" placeholder="2027Q1"></div><div><label class="label">Estado Atlas</label><select class="field ${f.estado ? 'status-'+slug(f.estado) : ''}" onchange="update('estado',this.value)">${statuses.map(x=>`<option value="${x}" ${f.estado===x?'selected':''}>${x || 'Seleccione estado'}</option>`).join('')}</select></div><div><label class="label">CU a la que pertenece</label><select class="field" onchange="update('unidad',this.value)">${['CU1','CU2'].map(x=>`<option ${f.unidad===x?'selected':''}>${x}</option>`).join('')}</select></div><div><label class="label">¿Aprobado?</label><select class="field" onchange="update('aprobado',this.value)">${['NO','Si','Sin Solicitar'].map(x=>`<option ${f.aprobado===x?'selected':''}>${x}</option>`).join('')}</select></div><div><label class="label">% GP</label><input class="field" type="number" value="${f.gp_pct}" onchange="update('gp_pct',Number(this.value))"></div><div><label class="label">% PTI</label><input class="field bg-[#f1f3f4] text-[#8a9099]" disabled value="${state.calc?Number(state.calc.pti_pct||0).toFixed(1):-21.4}"></div><div><label class="label">% Contingencia</label><input class="field" type="number" value="${f.contingencia_pct}" onchange="update('contingencia_pct',Number(this.value))"></div><div><label class="label">% Póliza</label><input class="field" type="number" value="${f.poliza_pct}" onchange="update('poliza_pct',Number(this.value))"></div><div class="xl:col-span-2"><fieldset class="border border-[#e4e8ef] rounded-2xl p-4"><legend class="px-2 text-[#1967d2] font-black text-sm">Otros Costos</legend><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label class="label">Labor</label><input class="field" type="text" value="${f.otros_costos_labor}" onchange="update('otros_costos_labor',this.value)" placeholder="Ej: 12000"></div><div><label class="label">Software</label><input class="field" type="text" value="${f.otros_costos_software}" onchange="update('otros_costos_software',this.value)" placeholder="Ej: 5000"></div></div></fieldset></div><div class="flex items-end gap-4"><div><label class="label">Precio aprox. (USD)</label><div class="font-black text-xl">${state.calc?money(state.calc.precio):'$ 0'}</div></div><button type="button" onclick="update('es_inversion',!state.form.es_inversion)" class="flex items-center gap-3 h-[46px]"><span class="switch ${f.es_inversion?'on':''}"><span></span></span><b>¿Es Inversión?</b></button><i data-lucide="piggy-bank" class="text-[#ff7043]"></i></div></div></section><section class="card overflow-hidden"><div class="p-5 flex flex-wrap gap-3 justify-between items-center"><div><h2 class="font-black text-lg">Equipo y dedicación mensual</h2><p class="text-sm text-[#5f6368] mt-1">Usa FTE mensual. Cada mes se multiplica por 160 horas y tarifa de banda.</p></div><button onclick="addResource()" class="btn btn-light">Agregar recurso <i data-lucide="plus"></i></button></div><div class="table-wrap"><table class="w-full text-sm"><thead class="bg-[#f8fafd]"><tr class="text-left"><th class="p-3 min-w-[150px]">Actividad</th><th class="p-3 min-w-[150px]">Perfil</th><th class="p-3 min-w-[100px]">Banda</th>${months.map(m=>`<th class="p-3 text-right min-w-[72px]">M${m}</th>`).join('')}<th class="p-3 min-w-[80px]">Hrs.</th><th class="p-3"></th></tr></thead><tbody>${f.recursos.map((r,i)=>`<tr class="border-t border-[#edf0f4]"><td class="p-3"><input class="field !p-2" value="${r.actividad}" onchange="state.form.recursos[${i}].actividad=this.value"></td><td class="p-3"><input class="field !p-2" value="${r.perfil}" onchange="state.form.recursos[${i}].perfil=this.value"></td><td class="p-3"><select class="field !p-2" onchange="state.form.recursos[${i}].banda=this.value">${bands.map(b=>`<option value="${b}" ${String(r.banda)===String(b)?'selected':''}>${b}</option>`).join('')}</select></td>${months.map((m,j)=>`<td class="p-2"><input type="number" step="0.1" class="mini-input" value="${r.meses[j]}" onfocus="if(this.value=='0') this.value=''" onblur="if(this.value==='') this.value='0'; state.form.recursos[${i}].meses[${j}]=Number(this.value)"></td>`).join('')}<td class="p-3 font-bold">${r.meses.reduce((a,b)=>a+Number(b||0)*160,0).toLocaleString()}</td><td class="p-3"><button onclick="delResource(${i})" class="text-[#EA4335]"><i data-lucide="trash-2"></i></button></td></tr>`).join('')}</tbody></table></div></section>${summary()}`}
function summary(){let c=state.calc;if(!c)return `<div class="mt-6 card p-6 text-[#5f6368]">Presiona <b>Calcular</b> para ver costo total, horas, PTI, precio aproximado e inversión.</div>${legend()}`;return `<section class="mt-6 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-4"><div class="card p-5 flex gap-4 items-center"><div class="metric-icon soft-blue" data-tip="Costo total equipo = Sumatoria de todos los costos mensuales de recursos. Cada mes: FTE x 160 horas x tarifa de banda."><i data-lucide="users"></i></div><div><span class="text-[#5f6368] text-sm font-semibold">Costo total equipo (USD)</span><div class="text-2xl font-black mt-1">${money(c.costo_total_equipo)}</div></div></div><div class="card p-5 flex gap-4 items-center"><div class="metric-icon soft-green" data-tip="Horas totales = Sumatoria de FTE mensual x 160 horas, para todos los recursos y meses."><i data-lucide="clock"></i></div><div><span class="text-[#5f6368] text-sm font-semibold">Horas totales</span><div class="text-2xl font-black mt-1">${Number(c.horas_totales).toLocaleString()}</div></div></div><div class="card p-5 flex gap-4 items-center"><div class="metric-icon soft-purple" data-tip="PTI % = % GP - 21.4. En este MVP se conserva como aproximación base hasta validar la fórmula final del PowerApps."><i data-lucide="percent"></i></div><div><span class="text-[#5f6368] text-sm font-semibold">PTI</span><div class="text-2xl font-black mt-1">${Number(c.pti_pct||0).toFixed(1)}%</div></div></div><div class="card p-5 flex gap-4 items-center"><div class="metric-icon soft-blue" data-tip="Precio aproximado = Sumatoria del revenue mensual + otros costos labor + otros costos software. Revenue mensual = costo mensual x uplift."><i data-lucide="circle-dollar-sign"></i></div><div><span class="text-[#5f6368] text-sm font-semibold">Precio aproximado (USD)</span><div class="text-2xl font-black mt-1">${money(c.precio)}</div></div></div><div class="card p-5 flex gap-4 items-center"><div class="metric-icon soft-orange" data-tip="¿Es inversión? = switch informativo. Clasifica la oportunidad como inversión, no suma un valor adicional al precio."><i data-lucide="trending-up"></i></div><div><span class="text-[#5f6368] text-sm font-semibold">¿Es inversión?</span><div class="text-2xl font-black mt-1">${state.form.es_inversion?'SI':'NO'}</div></div></div></section>${legend()}`}
function legend(){return `<div class="mt-6 flex justify-end"><div class="card px-6 py-4 flex flex-wrap gap-6 items-center text-sm font-bold"><span class="flex items-center gap-2"><i class="dot dot-won"></i>Won</span><span class="flex items-center gap-2"><i class="dot dot-lost"></i>Lost - Lost to Competition</span><span class="flex items-center gap-2"><i class="dot dot-noticed"></i>Noticed</span><span class="flex items-center gap-2"><i class="dot dot-validated"></i>Validated</span></div></div>`}
function render(){document.getElementById('app').innerHTML=state.user?shell():loginView();after()}render();
</script></body></html>
